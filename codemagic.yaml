workflows:

  # ─────────────────────────────────────────────
  # APP 1: Kiosk — Linux ARM64 (Raspberry Pi 5)
  # ─────────────────────────────────────────────
  # Note: Linux builds require a Linux instance. Codemagic Linux
  # instances (linux_x2) are paid ($0.045/min). Free tier only provides
  # macOS (mac_mini_m2). 
  # Furthermore, building for Raspberry Pi (ARM64) is best done natively
  # on the Pi itself rather than cross-compiling on x86 CI runners.
  # Compile directly on the Raspberry Pi:
  #   flutter build linux --release -t lib/apps/kiosk/main_kiosk.dart
  # 
  # kiosk-linux:
  #   ... (Disabled to preserve free tier billing) ...

  # ─────────────────────────────────────────────
  # APP 3: Patient Mobile — Web PWA (FREE iOS Alternative)
  # ─────────────────────────────────────────────
  patient-mobile-web:
    name: "App 3 · Patient Mobile · Web PWA"
    max_build_duration: 60
    instance_type: mac_mini_m2  # Codemagic Free Tier macOS instance
    environment:
      flutter: stable
      groups:
        - supabase
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
    scripts:
      - name: Write .env from CI secrets
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > assets/.env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> assets/.env
      - name: Get dependencies
        script: flutter pub get
      - name: Update version registry
        script: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" web/version.json || sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" web/version.json
      - name: Build Web PWA
        script: |
          flutter build web \
            --release \
            --target=lib/apps/patient/main_patient_web.dart \
            --base-href "/kiosk-application/"
      - name: Deploy to GitHub Pages
        script: |
          cd build/web
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Patient PWA"
          git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/KlarenceNevado/kiosk-application.git
          git push -f origin gh-pages
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # APP 3: Patient Mobile — Android APK
  # ─────────────────────────────────────────────
  patient-mobile-android:
    name: "App 3 · Patient Mobile · Android"
    max_build_duration: 60
    instance_type: mac_mini_m2  # Codemagic Free Tier macOS instance
    environment:
      flutter: stable
      groups:
        - supabase
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
    scripts:
      - name: Write .env from CI secrets
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > assets/.env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> assets/.env
      - name: Get dependencies
        script: flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk \
            --release \
            --target=lib/apps/patient/main_patient.dart
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # APP 2: Admin Desktop — Windows (local build, no Codemagic needed)
  # ─────────────────────────────────────────────
  # Note: Windows .exe builds require a Windows instance which Codemagic
  # doesn't provide — build locally with:
  #   flutter build windows -t lib/apps/admin/main_admin.dart --release
