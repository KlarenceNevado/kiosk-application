workflows:
  patient-mobile-ios:
    name: Patient Mobile - iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Flutter
        script: flutter precache --ios

      - name: Get dependencies
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --target=lib/main_patient_mobile.dart \
            --export-options-plist=/Users/builder/export_options.plist \
            --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # Also build Android APK via Codemagic for convenience
  patient-mobile-android:
    name: Patient Mobile - Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk \
            --release \
            --target=lib/main_patient_mobile.dart

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
